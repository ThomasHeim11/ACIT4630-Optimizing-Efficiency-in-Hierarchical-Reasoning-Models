# SHREK-Tiny V2 — ~3.4M parameters
# Reduced hidden_size from 512 to 256 (combined with lower LR=7e-5 to prevent collapse)
# head_dim stays 64: 256/4 = 64 (same as SHREK-Large)
# Smaller than TRM (~5-7M) — strongest "less is more" test.

name: hrm.hrm_act_v1@HierarchicalReasoningModel_ACTV1
loss:
  name: losses@ACTLossHead
  loss_type: stablemax_cross_entropy

halt_exploration_prob: 0.1
halt_max_steps: 16  # same as HRM — fair comparison at equal compute

H_cycles: 2
L_cycles: 2

# 2H + 2L layers (same as before)
H_layers: 2
L_layers: 2

hidden_size: 256   # V2: reduced from 512 — lower LR prevents collapse
num_heads: 4       # head_dim = 256/4 = 64
expansion: 4       # same as HRM baseline — fair comparison

puzzle_emb_ndim: ${.hidden_size}

pos_encodings: rope

# SHREK ablation flags — override from training scripts to disable components
enable_error_injection: true    # Error-Conditioned Injection (flip rate + learned estimator)
enable_stagnation_delta: true   # Stagnation-Aware Q-head (delta fed to Q-head)
